name: Deploy Team Task Tracker

on:
  push:
    branches:
      - main

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Frontend Install
        run: |
          cd frontend
          npm install

      - name: Frontend Test
        run: |
          cd frontend
          npm run test -- --run

      - name: Backend Install
        run: |
          cd backend
          npm install

      - name: Backend Test
        run: |
          cd backend
          npm test

      - name: Docker Compose Validation
        run: |
          docker compose config