version: "3.9"

services:

  backend:
    build:
      context: ./backend

    container_name: team-task-backend

    restart: always

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend

    container_name: team-task-frontend

    restart: always

    ports:
      - "4173:4173"

    depends_on:
      - backend

  redis:
    image: redis:7-alpine

    container_name: redis

    restart: always

    ports:
      - "6379:6379"

    volumes:
      - redis-data:/data

volumes:
  redis-data: